name: garment_ecommerce
description: Garment E-commerce Platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  provider: ^6.1.1
  badges: ^3.1.2
  shimmer: ^3.0.0
  intl: ^0.19.0
  http: ^1.2.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  cached_network_image: ^3.3.1
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  image_path: "assets/logo.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/
